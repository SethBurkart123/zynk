name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build wheels (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos-arm64
            runner: macos-14
            cibw-archs: arm64
            cibw-build: cp*-macosx_arm64
          - name: macos-x86_64
            runner: macos-13
            cibw-archs: x86_64
            cibw-build: cp*-macosx_x86_64
          - name: linux-x86_64
            runner: ubuntu-22.04
            cibw-archs: x86_64
            cibw-build: cp*-manylinux_x86_64
          - name: linux-arm64
            runner: ubuntu-22.04-arm
            cibw-archs: aarch64
            cibw-build: cp*-manylinux_aarch64
          - name: windows-x86_64
            runner: windows-latest
            cibw-archs: AMD64
            cibw-build: cp*-win_amd64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel build
      - name: Build wheels
        working-directory: bindings/python
        env:
          CIBW_ARCHS: ${{ matrix.platform.cibw-archs }}
          CIBW_BUILD: ${{ matrix.platform.cibw-build }}
        run: python -m cibuildwheel --output-dir dist
      - name: Build sdist
        if: matrix.platform.name == 'linux-x86_64'
        working-directory: bindings/python
        run: python -m build --sdist --outdir dist
      - name: Store distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions-${{ matrix.platform.name }}
          path: bindings/python/dist/

  pypi-publish:
    name: Upload release to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/zynk  
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-package-distributions-*
          path: dist/
          merge-multiple: true
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: pypi-publish
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          gh release create "$tag" \
            --repo="$GITHUB_REPOSITORY" \
            --title="zynk ${tag#v}" \
            --generate-notes
